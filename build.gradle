plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.vappleto'
version = '1.0'

repositories {
    mavenCentral()
}

application {
    mainClass = 'com.vappleto.todo.Main'
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = "21"

    modules = [
            'javafx.controls'
    ]
}

test {
    useJUnitPlatform()
}